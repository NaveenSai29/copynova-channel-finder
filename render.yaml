services:
  - type: web
    name: copynova-telegram-service
    env: python
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120
    envVars:
      - key: TELEGRAM_API_ID
        value: "23111641"
      - key: TELEGRAM_API_HASH
        value: "6288120282735bf0fecc4753ee60b1b8"
      - key: SERVER_URL
        value: "https://your-vercel-app.vercel.app"
      - key: PYTHON_VERSION
        value: "3.11.0"